<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Skynet Cyber Café</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #e0f2fe; line-height: 1.5; min-height: 100vh; }
    :root { --neon-blue: #0cf; --dark-card: #11161f; }
    .app { max-width: 1400px; margin: 0 auto; padding: 0 1rem; }
    .cyber-header {
      display: flex; align-items: center; justify-content: space-between; padding: 1rem 0;
      border-bottom: 2px solid #0cf3; flex-wrap: wrap; gap: 0.8rem;
    }
    .logo h1 {
      font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #a0f0ff, #0cf);
      -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 10px #0cf;
    }
    .logo p { font-size: 0.8rem; opacity: 0.8; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .nav-btn {
      background: transparent; border: 1px solid #2e4b6e; color: #b8d4ff; padding: 0.5rem 1.2rem;
      border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
    }
    .nav-btn:hover, .nav-btn.active { background: #0cf2; border-color: #0cf; box-shadow: 0 0 12px #0cf6; color: white; }
    .auth-area { display: flex; align-items: center; gap: 0.5rem; }
    .user-badge { background: #0a1a2a; padding: 0.3rem 1rem; border-radius: 30px; border: 1px solid #0cf; font-size: 0.9rem; }
    .view-container { margin: 2rem 0; animation: fade 0.3s; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 1.5rem; border-left: 6px solid #0cf; padding-left: 1rem; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.2rem; }
    .service-card {
      background: var(--dark-card); border-radius: 20px; padding: 1.2rem 0.8rem; border: 1px solid #2a3a55;
      box-shadow: 0 10px 20px #00000050; transition: all 0.25s; text-align: center; cursor: pointer;
    }
    .service-card:hover { transform: translateY(-5px); border-color: #0cf; box-shadow: 0 0 22px #0cf4; }
    .service-card i { font-size: 2.5rem; color: #0cf; margin-bottom: 0.8rem; }
    .service-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; margin-bottom: 0.8rem; border: 2px solid #0cf5; }
    .category-badge { font-size: 0.7rem; background: #0cf2; padding: 0.2rem 0.8rem; border-radius: 30px; display: inline-block; margin-top: 0.5rem; }
    .form-card { max-width: 420px; margin: 0 auto; background: #101a24; padding: 2rem; border-radius: 30px; border: 1px solid #0cf6; }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; margin-bottom: 0.3rem; }
    .input-group input, .input-group textarea {
      width: 100%; padding: 0.9rem 1rem; background: #0b1119; border: 1.5px solid #2a4058;
      border-radius: 40px; color: white; font-size: 1rem; outline: none;
    }
    .btn-primary {
      background: #0cf; border: none; color: #000; font-weight: 700; padding: 0.9rem 1.5rem;
      border-radius: 60px; width: 100%; font-size: 1.1rem; cursor: pointer; box-shadow: 0 0 18px #0cf9;
    }
    .btn-outline { background: transparent; border: 1.5px solid #0cf; color: #0cf; padding: 0.7rem 1.5rem; border-radius: 60px; cursor: pointer; }
    .chat-container { background: #0f1822; border-radius: 30px; border: 1px solid #0cf5; padding: 1.5rem; height: 70vh; display: flex; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
    .chat-message { background: #1a2533; padding: 0.8rem 1.2rem; border-radius: 20px; max-width: 80%; border-left: 4px solid #0cf; }
    .chat-input-area { display: flex; gap: 10px; margin-top: 1rem; }
    .chat-input-area input { flex: 1; padding: 1rem; background: #0b1119; border: 1px solid #0cf6; border-radius: 60px; color: white; }
    .admin-section { background: #0c1420; border-radius: 24px; padding: 1.8rem; border: 1px solid #0cf; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0cf; color: #000; padding: 0.8rem 1.5rem; border-radius: 40px; font-weight: 600; z-index: 9999; }
    .contact-footer { margin-top: 3rem; text-align: center; opacity: 0.7; font-size: 0.9rem; border-top: 1px solid #1e3a5a; padding-top: 1.5rem; }
  </style>
</head>
<body>
<div class="app">
  <header class="cyber-header">
    <div class="logo"><h1>SKYNET CYBER</h1><p>Fast • Reliable • Professional</p></div>
    <div class="nav-links" id="navLinks"></div>
    <div class="auth-area" id="authArea"></div>
  </header>
  <div id="viewContainer" class="view-container"></div>
  <div class="contact-footer">
    <p><i class="fas fa-phone"></i> 0716630443 | <i class="fab fa-whatsapp"></i> 0713614441 | <i class="fas fa-envelope"></i> skynetdigitol@gmail.com</p>
    <p><i class="fas fa-map-marker-alt"></i> Opposite former Western Express Booking Office, along KAG Church</p>
  </div>
</div>
<script>
  (function(){
    // ---------- STORAGE ----------
    const STORAGE = {
      services: 'skynet_services',
      chat: 'skynet_chat',
      users: 'skynet_users'
    };
    const ADMIN_EMAIL = 'admin@skynet.com', ADMIN_PASS = 'admin123';
    
    let currentUser = null;
    let services = [];
    let chatMessages = [];

    // DOM elements
    const navLinks = document.getElementById('navLinks');
    const authArea = document.getElementById('authArea');
    const viewContainer = document.getElementById('viewContainer');

    // ---------- INIT DATA ----------
    function initData() {
      // Services
      const stored = localStorage.getItem(STORAGE.services);
      if (stored) services = JSON.parse(stored);
      else {
        services = [
          { id:'1', name:'Internet Browsing', category:'💻 Cyber Services', description:'High-speed fiber', imageUrl:'' },
          { id:'2', name:'Printing', category:'💻 Cyber Services', description:'B&W / Color', imageUrl:'' },
          { id:'3', name:'Photocopy', category:'💻 Cyber Services', description:'Clear copies', imageUrl:'' },
          { id:'4', name:'Scanning', category:'💻 Cyber Services', description:'Document scanning', imageUrl:'' },
          { id:'5', name:'Lamination', category:'💻 Cyber Services', description:'Up to A3', imageUrl:'' },
          { id:'6', name:'Binding', category:'💻 Cyber Services', description:'Spiral/Comb', imageUrl:'' },
          { id:'7', name:'Passport Photos', category:'💻 Cyber Services', description:'Instant', imageUrl:'' },
          { id:'8', name:'Typing Services', category:'💻 Cyber Services', description:'Professional', imageUrl:'' },
          { id:'9', name:'KRA Returns', category:'🏛️ Government Services', description:'Filing & PIN', imageUrl:'' },
          { id:'10', name:'NHIF / SHA', category:'🏛️ Government Services', description:'Registration', imageUrl:'' },
          { id:'11', name:'NSSF', category:'🏛️ Government Services', description:'NSSF services', imageUrl:'' },
          { id:'12', name:'HELB', category:'🏛️ Government Services', description:'Loan applications', imageUrl:'' },
          { id:'13', name:'E-TIMS', category:'🏛️ Government Services', description:'Registration', imageUrl:'' },
          { id:'14', name:'Payslips', category:'🏛️ Government Services', description:'Processing', imageUrl:'' },
          { id:'15', name:'ID Application', category:'📄 eCitizen Services', description:'New/replacement', imageUrl:'' },
          { id:'16', name:'Passport', category:'📄 eCitizen Services', description:'ePassport', imageUrl:'' },
          { id:'17', name:'Driving License', category:'📄 eCitizen Services', description:'NTSA', imageUrl:'' },
          { id:'18', name:'Good Conduct', category:'📄 eCitizen Services', description:'Certificate', imageUrl:'' },
          { id:'19', name:'Business Reg', category:'📄 eCitizen Services', description:'eCitizen', imageUrl:'' },
          { id:'20', name:'Vehicle Transfer', category:'📄 eCitizen Services', description:'Logbook', imageUrl:'' },
          { id:'21', name:'CBC Services', category:'🎓 Education', description:'Competency', imageUrl:'' },
          { id:'22', name:'Exam Printing', category:'🎓 Education', description:'Exams & notes', imageUrl:'' },
          { id:'23', name:'Learner Reg', category:'🎓 Education', description:'School reg', imageUrl:'' },
          { id:'24', name:'Results Keying', category:'🎓 Education', description:'KNEC', imageUrl:'' },
          { id:'25', name:'Flyers/Posters', category:'🎨 Graphic Design', description:'Design', imageUrl:'' },
          { id:'26', name:'Wedding Cards', category:'🎨 Graphic Design', description:'Custom', imageUrl:'' },
          { id:'27', name:'Website Creation', category:'🚀 Tech Services', description:'Business sites', imageUrl:'' },
          { id:'28', name:'App Development', category:'🚀 Tech Services', description:'Mobile apps', imageUrl:'' },
          { id:'29', name:'IT Consultancy', category:'🚀 Tech Services', description:'Tech advice', imageUrl:'' }
        ];
        localStorage.setItem(STORAGE.services, JSON.stringify(services));
      }
      // Chat
      const chatStored = localStorage.getItem(STORAGE.chat);
      chatMessages = chatStored ? JSON.parse(chatStored) : [{ id: Date.now()+'', user:'System', text:'Welcome!', timestamp: new Date().toISOString() }];
      // Users
      if (!localStorage.getItem(STORAGE.users)) {
        localStorage.setItem(STORAGE.users, JSON.stringify([{ email: ADMIN_EMAIL, password: ADMIN_PASS }]));
      }
    }

    function saveServices() { localStorage.setItem(STORAGE.services, JSON.stringify(services)); }
    function saveChat() { localStorage.setItem(STORAGE.chat, JSON.stringify(chatMessages)); }

    function toast(msg) {
      const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    // ---------- RENDER NAV & AUTH UI ----------
    function renderHeader() {
      const views = ['home', 'services', 'chat'];
      if (!currentUser) views.push('login');
      if (currentUser && currentUser.isAdmin) views.push('admin');
      
      navLinks.innerHTML = views.map(v => {
        const icons = { home:'fa-home', services:'fa-cogs', chat:'fa-comments', login:'fa-sign-in-alt', admin:'fa-shield-alt' };
        const labels = { home:'Home', services:'Services', chat:'Chat', login:'Login', admin:'Admin' };
        return `<button class="nav-btn" data-view="${v}"><i class="fas ${icons[v]}"></i> ${labels[v]}</button>`;
      }).join('');
      
      authArea.innerHTML = `
        <span class="user-badge"><i class="fas fa-user"></i> ${currentUser ? currentUser.email : 'Guest'}</span>
        ${currentUser ? '<button class="nav-btn" id="logoutBtn">Logout</button>' : ''}
      `;
      
      document.querySelectorAll('[data-view]').forEach(btn => btn.addEventListener('click', (e) => {
        const view = btn.dataset.view;
        if (view === 'admin' && (!currentUser || !currentUser.isAdmin)) { toast('Admin only'); return; }
        if (view === 'chat' && !currentUser) { toast('Login to chat'); renderView('login'); return; }
        renderView(view);
      }));
      
      if (currentUser) document.getElementById('logoutBtn')?.addEventListener('click', () => {
        currentUser = null; renderHeader(); renderView('home'); toast('Logged out');
      });
      
      // Activate current view button
      const activeView = viewContainer.getAttribute('data-current') || 'home';
      document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === activeView));
    }

    // ---------- RENDER VIEW ----------
    function renderView(view) {
      viewContainer.setAttribute('data-current', view);
      renderHeader();
      switch(view) {
        case 'home': viewContainer.innerHTML = homeHTML(); break;
        case 'services': viewContainer.innerHTML = servicesHTML(); attachServiceClicks(); break;
        case 'login': viewContainer.innerHTML = loginHTML(); attachLoginEvents(); break;
        case 'admin': if (currentUser?.isAdmin) { viewContainer.innerHTML = adminHTML(); renderAdminList(); attachAdminEvents(); } else viewContainer.innerHTML = '<h2>Access Denied</h2>'; break;
        case 'chat': viewContainer.innerHTML = chatHTML(); initChat(); break;
        default: viewContainer.innerHTML = homeHTML();
      }
    }

    function homeHTML() {
      return `
        <div style="text-align:center;padding:2rem 0">
          <h2 style="font-size:2.5rem;text-shadow:0 0 20px #0cf">Fast, Reliable & Professional</h2>
          <p style="margin:1rem 0">Your one-stop digital hub</p>
          <div style="display:flex;gap:1rem;justify-content:center">
            <button class="btn-primary" style="width:auto;padding:1rem 2.5rem" onclick="document.querySelector('[data-view=\\'services\\']').click()">View Services</button>
            ${!currentUser ? '<button class="btn-outline" onclick="document.querySelector(\'[data-view=\\'login\\']\').click()">Login / Sign Up</button>' : ''}
          </div>
          <div style="margin-top:3rem;background:#0f1a26;border-radius:40px;padding:2rem;border:1px solid #0cf5">
            <h3><i class="fas fa-clock"></i> Working Hours</h3>
            <p>Mon-Sat 7AM-9PM | Sun 10AM-6PM</p>
          </div>
        </div>`;
    }

    function servicesHTML() {
      const grouped = {};
      services.forEach(s => { if(!grouped[s.category]) grouped[s.category] = []; grouped[s.category].push(s); });
      let html = `<h2 class="section-title"><i class="fas fa-cogs"></i> Our Services</h2>`;
      for (let cat in grouped) {
        html += `<h3 style="margin:1.5rem 0 1rem;color:#a0e0ff">${cat}</h3><div class="card-grid">`;
        grouped[cat].forEach(s => {
          html += `<div class="service-card" data-id="${s.id}" data-name="${s.name}" data-desc="${s.description}">
            ${s.imageUrl ? `<img src="${s.imageUrl}">` : '<i class="fas fa-microchip"></i>'}
            <h4>${s.name}</h4><span class="category-badge">${s.category}</span></div>`;
        });
        html += '</div>';
      }
      return html;
    }
    function attachServiceClicks() {
      document.querySelectorAll('.service-card').forEach(c => c.addEventListener('click', () => {
        alert(`${c.dataset.name}\n${c.dataset.desc || 'Available at Skynet.'}`);
      }));
    }

    function loginHTML() {
      return `<div class="form-card">
        <h2 style="text-align:center">Login / Sign Up</h2>
        <div style="display:flex;gap:0.5rem;margin:1.5rem 0"><button class="nav-btn active" id="showLogin">Login</button><button class="nav-btn" id="showSignup">Sign Up</button></div>
        <form id="authForm">
          <div class="input-group"><label>Email</label><input type="email" id="authEmail" required></div>
          <div class="input-group"><label>Password</label><input type="password" id="authPassword" required minlength="4"></div>
          <button type="submit" class="btn-primary" id="authSubmitBtn">Login</button>
        </form><p id="authError" style="color:#ff7b7b;margin-top:1rem"></p>
      </div>`;
    }
    function attachLoginEvents() {
      let mode = 'login';
      const showLogin = document.getElementById('showLogin'), showSignup = document.getElementById('showSignup');
      const submitBtn = document.getElementById('authSubmitBtn'), form = document.getElementById('authForm');
      const errorP = document.getElementById('authError');
      showLogin.onclick = () => { mode='login'; submitBtn.textContent='Login'; showLogin.classList.add('active'); showSignup.classList.remove('active'); };
      showSignup.onclick = () => { mode='signup'; submitBtn.textContent='Sign Up'; showSignup.classList.add('active'); showLogin.classList.remove('active'); };
      form.onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const pass = document.getElementById('authPassword').value;
        const users = JSON.parse(localStorage.getItem(STORAGE.users));
        if (mode === 'signup') {
          if (users.find(u => u.email === email)) { errorP.textContent = 'Email exists'; return; }
          users.push({ email, password: pass });
          localStorage.setItem(STORAGE.users, JSON.stringify(users));
          currentUser = { email, isAdmin: email === ADMIN_EMAIL };
          renderHeader(); renderView('home'); toast('Account created');
        } else {
          const user = users.find(u => u.email === email && u.password === pass);
          if (user) { currentUser = { email: user.email, isAdmin: user.email === ADMIN_EMAIL }; renderHeader(); renderView('home'); toast('Logged in'); }
          else errorP.textContent = 'Invalid credentials';
        }
      };
    }

    function chatHTML() {
      return `<div class="chat-container"><h3>Public Chat</h3><div id="chatMessages" class="chat-messages"></div>
        ${currentUser ? `<div class="chat-input-area"><input id="chatInput" placeholder="Message..."><button class="btn-primary" id="sendChatBtn" style="width:auto"><i class="fas fa-paper-plane"></i></button></div>` : '<p>Login to chat</p>'}</div>`;
    }
    function initChat() {
      const msgDiv = document.getElementById('chatMessages'), input = document.getElementById('chatInput'), sendBtn = document.getElementById('sendChatBtn');
      function render() {
        msgDiv.innerHTML = chatMessages.slice(-50).map(m => `<div class="chat-message"><div class="meta">${m.user} • ${new Date(m.timestamp).toLocaleTimeString()}</div>${m.text}</div>`).join('');
        msgDiv.scrollTop = msgDiv.scrollHeight;
      }
      render();
      const send = () => {
        if (!input.value.trim()) return;
        chatMessages.push({ id: Date.now()+'', user: currentUser.email.split('@')[0], text: input.value.trim(), timestamp: new Date().toISOString() });
        if (chatMessages.length > 100) chatMessages.shift();
        saveChat(); render(); input.value = '';
      };
      sendBtn.onclick = send;
      input.onkeypress = (e) => { if(e.key==='Enter') send(); };
    }

    function adminHTML() {
      return `<div class="admin-section"><h2>Admin Dashboard</h2>
        <div style="margin:2rem 0"><h3>Add Service</h3>
          <form id="addServiceForm">
            <div style="display:flex;gap:1rem"><div class="input-group"><input placeholder="Name" id="svcName" required></div>
            <div class="input-group"><input placeholder="Category" id="svcCat" required list="catList"></div></div>
            <datalist id="catList"><option>💻 Cyber Services</option><option>🏛️ Government Services</option><option>📄 eCitizen Services</option><option>🎓 Education</option><option>🎨 Graphic Design</option><option>🚀 Tech Services</option></datalist>
            <div class="input-group"><textarea placeholder="Description" id="svcDesc"></textarea></div>
            <div class="input-group"><label>Image (optional)</label><input type="file" id="svcImage" accept="image/*"></div>
            <button type="submit" class="btn-primary">Add Service</button>
          </form>
        </div><hr style="border-color:#0cf3;margin:2rem 0"><h3>Manage Services</h3><div id="adminServiceList"></div></div>`;
    }
    function renderAdminList() {
      const listDiv = document.getElementById('adminServiceList');
      listDiv.innerHTML = services.map(s => `
        <div style="background:#1a2533;padding:0.8rem;border-radius:20px;margin-bottom:0.5rem;display:flex;justify-content:space-between">
          <span><strong>${s.name}</strong> (${s.category})</span>
          <button class="nav-btn delete-btn" data-id="${s.id}" style="color:#ff8080"><i class="fas fa-trash"></i></button>
        </div>`).join('');
      document.querySelectorAll('.delete-btn').forEach(b => b.onclick = () => {
        services = services.filter(s => s.id !== b.dataset.id); saveServices(); renderAdminList(); toast('Deleted');
      });
    }
    function attachAdminEvents() {
      document.getElementById('addServiceForm').onsubmit = (e) => {
        e.preventDefault();
        const name = document.getElementById('svcName').value, cat = document.getElementById('svcCat').value, desc = document.getElementById('svcDesc').value;
        const file = document.getElementById('svcImage').files[0];
        const add = (url) => {
          services.push({ id: Date.now()+'', name, category: cat, description: desc, imageUrl: url });
          saveServices(); renderAdminList(); document.getElementById('addServiceForm').reset(); toast('Added');
        };
        if (file) { const r = new FileReader(); r.onload = (e) => add(e.target.result); r.readAsDataURL(file); }
        else add('');
      };
    }

    // ---------- BOOTSTRAP ----------
    initData();
    renderHeader();
    renderView('home');
  })();
</script>
</body>
  </html>
