<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Skynet Cyber Café</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0e14;
      color: #e0f2fe;
      line-height: 1.5;
      min-height: 100vh;
    }
    :root {
      --neon-blue: #0cf;
      --neon-glow: 0 0 10px #0cf, 0 0 20px #0cf6;
      --dark-card: #11161f;
      --border-glow: 1px solid #2a3a55;
    }
    .app { max-width: 1400px; margin: 0 auto; padding: 0 1rem; }
    .cyber-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 2px solid #0cf3;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a0f0ff, #0cf);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: var(--neon-glow);
    }
    .logo p { font-size: 0.8rem; opacity: 0.8; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .nav-btn {
      background: transparent;
      border: 1px solid #2e4b6e;
      color: #b8d4ff;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .nav-btn:hover, .nav-btn.active {
      background: #0cf2;
      border-color: #0cf;
      box-shadow: 0 0 12px #0cf6;
      color: white;
    }
    .auth-area { display: flex; align-items: center; gap: 0.5rem; }
    .user-badge {
      background: #0a1a2a;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      border: 1px solid #0cf;
      font-size: 0.9rem;
    }
    .view-container { margin: 2rem 0; animation: fade 0.3s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .section-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      border-left: 6px solid #0cf;
      padding-left: 1rem;
      text-shadow: 0 0 8px #0cf5;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.2rem;
    }
    .service-card {
      background: var(--dark-card);
      border-radius: 20px;
      padding: 1.2rem 0.8rem;
      border: var(--border-glow);
      box-shadow: 0 10px 20px #00000050;
      transition: all 0.25s;
      text-align: center;
      cursor: pointer;
    }
    .service-card:hover {
      transform: translateY(-5px);
      border-color: #0cf;
      box-shadow: 0 0 22px #0cf4, 0 10px 20px #000;
    }
    .service-card i { font-size: 2.5rem; color: #0cf; margin-bottom: 0.8rem; }
    .service-card img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 0.8rem;
      border: 2px solid #0cf5;
    }
    .category-badge {
      font-size: 0.7rem;
      background: #0cf2;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      display: inline-block;
      margin-top: 0.5rem;
    }
    .form-card {
      max-width: 420px;
      margin: 0 auto;
      background: #101a24;
      padding: 2rem;
      border-radius: 30px;
      border: 1px solid #0cf6;
      box-shadow: 0 20px 30px #000;
    }
    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; margin-bottom: 0.3rem; font-weight: 500; }
    .input-group input, .input-group textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      background: #0b1119;
      border: 1.5px solid #2a4058;
      border-radius: 40px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .input-group input:focus, .input-group textarea:focus {
      border-color: #0cf;
      box-shadow: 0 0 12px #0cf6;
    }
    .btn-primary {
      background: #0cf;
      border: none;
      color: #000;
      font-weight: 700;
      padding: 0.9rem 1.5rem;
      border-radius: 60px;
      width: 100%;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 0 18px #0cf9;
      transition: 0.2s;
    }
    .btn-primary:hover { background: #6ee4ff; transform: scale(1.02); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #0cf;
      color: #0cf;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      cursor: pointer;
    }
    .chat-container {
      background: #0f1822;
      border-radius: 30px;
      border: 1px solid #0cf5;
      padding: 1.5rem;
      height: 70vh;
      display: flex;
      flex-direction: column;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .chat-message {
      background: #1a2533;
      padding: 0.8rem 1.2rem;
      border-radius: 20px;
      max-width: 80%;
      align-self: flex-start;
      border-left: 4px solid #0cf;
    }
    .chat-message .meta {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-bottom: 0.2rem;
    }
    .chat-input-area {
      display: flex;
      gap: 10px;
      margin-top: 1rem;
    }
    .chat-input-area input {
      flex: 1;
      padding: 1rem;
      background: #0b1119;
      border: 1px solid #0cf6;
      border-radius: 60px;
      color: white;
    }
    .admin-section {
      background: #0c1420;
      border-radius: 24px;
      padding: 1.8rem;
      border: 1px solid #0cf;
    }
    .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    @media (max-width: 640px) {
      .logo h1 { font-size: 1.5rem; }
      .nav-btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0cf;
      color: #000;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      box-shadow: 0 0 20px #0cf;
      z-index: 9999;
    }
    .contact-footer {
      margin-top: 3rem;
      text-align: center;
      opacity: 0.7;
      font-size: 0.9rem;
      border-top: 1px solid #1e3a5a;
      padding-top: 1.5rem;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="cyber-header">
    <div class="logo">
      <h1>SKYNET CYBER</h1>
      <p>Fast • Reliable • Professional</p>
    </div>
    <div class="nav-links" id="navLinks">
      <button class="nav-btn active" data-view="home"><i class="fas fa-home"></i> Home</button>
      <button class="nav-btn" data-view="services"><i class="fas fa-cogs"></i> Services</button>
      <button class="nav-btn" data-view="chat"><i class="fas fa-comments"></i> Chat</button>
      <button class="nav-btn" data-view="login" id="loginNavBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
      <button class="nav-btn admin-only" data-view="admin" style="display:none;" id="adminNavBtn"><i class="fas fa-shield-alt"></i> Admin</button>
    </div>
    <div class="auth-area" id="authArea">
      <span id="userDisplay" class="user-badge"><i class="fas fa-user"></i> Guest</span>
      <button class="nav-btn" id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </header>

  <!-- View Container -->
  <div id="viewContainer" class="view-container"></div>

  <!-- Footer Contact -->
  <div class="contact-footer">
    <p><i class="fas fa-phone"></i> 0716630443  |  <i class="fab fa-whatsapp"></i> 0713614441  |  <i class="fas fa-envelope"></i> skynetdigitol@gmail.com</p>
    <p><i class="fas fa-map-marker-alt"></i> Opposite former Western Express Booking Office, along KAG Church</p>
  </div>
</div>

<script>
  (function(){
    'use strict';

    // ---------- LOCAL STORAGE KEYS ----------
    const STORAGE_SERVICES = 'skynet_services';
    const STORAGE_CHAT = 'skynet_chat';
    const STORAGE_USERS = 'skynet_users';
    const ADMIN_EMAIL = 'admin@skynet.com';
    const ADMIN_PASSWORD = 'admin123'; // change if needed

    // ---------- GLOBAL STATE ----------
    let currentUser = null; // { email, isAdmin }
    let services = [];
    let chatMessages = [];

    // DOM elements
    const viewContainer = document.getElementById('viewContainer');
    const navBtns = document.querySelectorAll('.nav-btn[data-view]');
    const loginNavBtn = document.getElementById('loginNavBtn');
    const adminNavBtn = document.getElementById('adminNavBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userDisplay = document.getElementById('userDisplay');

    // ---------- INITIALIZE DEFAULT DATA ----------
    function initData() {
      // Services
      const storedServices = localStorage.getItem(STORAGE_SERVICES);
      if (storedServices) {
        services = JSON.parse(storedServices);
      } else {
        services = [
          { id: '1', name: 'Internet Browsing', category: '💻 Cyber Services', description: 'High-speed fiber internet', imageUrl: '' },
          { id: '2', name: 'Printing (B&W/Color)', category: '💻 Cyber Services', description: 'Quality printing services', imageUrl: '' },
          { id: '3', name: 'Photocopy', category: '💻 Cyber Services', description: 'Clear photocopies', imageUrl: '' },
          { id: '4', name: 'Scanning', category: '💻 Cyber Services', description: 'Document scanning', imageUrl: '' },
          { id: '5', name: 'Lamination', category: '💻 Cyber Services', description: 'Lamination up to A3', imageUrl: '' },
          { id: '6', name: 'Binding', category: '💻 Cyber Services', description: 'Spiral and comb binding', imageUrl: '' },
          { id: '7', name: 'Passport Photos', category: '💻 Cyber Services', description: 'Instant passport size', imageUrl: '' },
          { id: '8', name: 'Typing Services', category: '💻 Cyber Services', description: 'Professional typing', imageUrl: '' },
          { id: '9', name: 'KRA Returns', category: '🏛️ Government Services', description: 'KRA PIN & returns filing', imageUrl: '' },
          { id: '10', name: 'NHIF / SHA', category: '🏛️ Government Services', description: 'Registration & updates', imageUrl: '' },
          { id: '11', name: 'NSSF', category: '🏛️ Government Services', description: 'NSSF services', imageUrl: '' },
          { id: '12', name: 'HELB Applications', category: '🏛️ Government Services', description: 'Loan applications', imageUrl: '' },
          { id: '13', name: 'E-TIMS Registration', category: '🏛️ Government Services', description: 'E-TIMS setup', imageUrl: '' },
          { id: '14', name: 'Payslips Processing', category: '🏛️ Government Services', description: 'Payslip generation', imageUrl: '' },
          { id: '15', name: 'ID Application', category: '📄 eCitizen Services', description: 'New / replacement ID', imageUrl: '' },
          { id: '16', name: 'Passport Application', category: '📄 eCitizen Services', description: 'ePassport assistance', imageUrl: '' },
          { id: '17', name: 'Driving License', category: '📄 eCitizen Services', description: 'NTSA services', imageUrl: '' },
          { id: '18', name: 'Good Conduct', category: '📄 eCitizen Services', description: 'Certificate of good conduct', imageUrl: '' },
          { id: '19', name: 'Business Registration', category: '📄 eCitizen Services', description: 'eCitizen business registration', imageUrl: '' },
          { id: '20', name: 'Vehicle Transfer', category: '📄 eCitizen Services', description: 'NTSA logbook transfer', imageUrl: '' },
          { id: '21', name: 'CBC Services', category: '🎓 Education Services', description: 'Competency based curriculum', imageUrl: '' },
          { id: '22', name: 'Exam Printing', category: '🎓 Education Services', description: 'Print exams & notes', imageUrl: '' },
          { id: '23', name: 'Learner Registration', category: '🎓 Education Services', description: 'School registration', imageUrl: '' },
          { id: '24', name: 'Results Keying', category: '🎓 Education Services', description: 'KNEC results entry', imageUrl: '' },
          { id: '25', name: 'Flyers & Posters', category: '🎨 Graphic Design', description: 'Professional design', imageUrl: '' },
          { id: '26', name: 'Wedding Cards', category: '🎨 Graphic Design', description: 'Custom wedding cards', imageUrl: '' },
          { id: '27', name: 'Website Creation', category: '🚀 Tech Services', description: 'Business websites', imageUrl: '' },
          { id: '28', name: 'App Development', category: '🚀 Tech Services', description: 'Mobile apps', imageUrl: '' },
          { id: '29', name: 'IT Consultancy', category: '🚀 Tech Services', description: 'Tech advice', imageUrl: '' }
        ];
        saveServices();
      }

      // Chat messages
      const storedChat = localStorage.getItem(STORAGE_CHAT);
      if (storedChat) {
        chatMessages = JSON.parse(storedChat);
      } else {
        chatMessages = [
          { id: Date.now() + '1', user: 'System', text: 'Welcome to Skynet Cyber Chat!', timestamp: new Date().toISOString() }
        ];
        saveChat();
      }

      // Users (simple array for signup)
      if (!localStorage.getItem(STORAGE_USERS)) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify([{ email: ADMIN_EMAIL, password: ADMIN_PASSWORD }]));
      }
    }

    function saveServices() {
      localStorage.setItem(STORAGE_SERVICES, JSON.stringify(services));
    }

    function saveChat() {
      localStorage.setItem(STORAGE_CHAT, JSON.stringify(chatMessages));
    }

    // ---------- TOAST ----------
    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // ---------- RENDER VIEW ----------
    function renderView(view) {
      navBtns.forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-view="${view}"]`)?.classList.add('active');
      
      switch(view) {
        case 'home': viewContainer.innerHTML = homeHTML(); break;
        case 'services': viewContainer.innerHTML = servicesHTML(); attachServiceClick(); break;
        case 'login': viewContainer.innerHTML = loginHTML(); attachLoginEvents(); break;
        case 'admin': 
          if (currentUser && currentUser.isAdmin) {
            viewContainer.innerHTML = adminPanelHTML();
            renderAdminServiceList();
            attachAdminEvents();
          } else {
            viewContainer.innerHTML = '<h2 style="text-align:center; margin-top:3rem;">🔒 Admin Access Only</h2>';
          }
          break;
        case 'chat': viewContainer.innerHTML = chatHTML(); initChat(); break;
        default: viewContainer.innerHTML = homeHTML();
      }
    }

    // ---------- HOME ----------
    function homeHTML() {
      return `
        <div style="text-align: center; padding: 2rem 0;">
          <h2 style="font-size: 2.5rem; font-weight: 800; text-shadow: 0 0 20px #0cf;">Fast, Reliable & Professional</h2>
          <p style="font-size: 1.2rem; margin: 1rem 0 2rem;">Your one-stop digital hub in the heart of the city.</p>
          <div style="display: flex; gap: 1rem; justify-content: center;">
            <button class="btn-primary" style="width:auto; padding:1rem 2.5rem;" onclick="document.querySelector('[data-view=\\'services\\']').click()">View Services</button>
            ${!currentUser ? '<button class="btn-outline" onclick="document.querySelector(\'[data-view=\\'login\\']\').click()">Login / Sign Up</button>' : ''}
          </div>
          <div style="margin-top: 3rem; background: #0f1a26; border-radius: 40px; padding: 2rem; border:1px solid #0cf5;">
            <h3><i class="fas fa-clock"></i> Working Hours</h3>
            <p>Mon - Sat: 7:00 AM - 9:00 PM | Sun: 10:00 AM - 6:00 PM</p>
          </div>
        </div>
      `;
    }

    // ---------- SERVICES ----------
    function servicesHTML() {
      let grouped = {};
      services.forEach(s => { if(!grouped[s.category]) grouped[s.category] = []; grouped[s.category].push(s); });
      let html = `<h2 class="section-title"><i class="fas fa-cogs"></i> Our Services</h2>`;
      for (let cat in grouped) {
        html += `<h3 style="margin:1.5rem 0 1rem; color:#a0e0ff;">${cat}</h3><div class="card-grid">`;
        grouped[cat].forEach(svc => {
          html += `<div class="service-card" data-id="${svc.id}" data-name="${svc.name}" data-desc="${svc.description || ''}">
            ${svc.imageUrl ? `<img src="${svc.imageUrl}" alt="${svc.name}">` : '<i class="fas fa-microchip"></i>'}
            <h4>${svc.name}</h4>
            <span class="category-badge">${svc.category}</span>
          </div>`;
        });
        html += '</div>';
      }
      return html;
    }

    function attachServiceClick() {
      document.querySelectorAll('.service-card').forEach(card => {
        card.addEventListener('click', () => {
          alert(`${card.dataset.name}\n${card.dataset.desc || 'Available at Skynet Cyber Café.'}`);
        });
      });
    }

    // ---------- LOGIN / SIGNUP ----------
    function loginHTML() {
      return `
        <div class="form-card">
          <h2 style="text-align:center; margin-bottom:1.5rem;"><i class="fas fa-user-lock"></i> Login / Sign Up</h2>
          <div id="authToggle" style="display:flex; gap:0.5rem; margin-bottom:1.5rem;">
            <button class="nav-btn active" id="showLogin">Login</button>
            <button class="nav-btn" id="showSignup">Sign Up</button>
          </div>
          <form id="authForm">
            <div class="input-group"><label>Email</label><input type="email" id="authEmail" required></div>
            <div class="input-group"><label>Password</label><input type="password" id="authPassword" required minlength="4"></div>
            <button type="submit" class="btn-primary" id="authSubmitBtn">Login</button>
          </form>
          <p id="authError" style="color:#ff7b7b; margin-top:1rem;"></p>
        </div>
      `;
    }

    function attachLoginEvents() {
      let mode = 'login';
      const showLogin = document.getElementById('showLogin');
      const showSignup = document.getElementById('showSignup');
      const form = document.getElementById('authForm');
      const submitBtn = document.getElementById('authSubmitBtn');
      const errorP = document.getElementById('authError');
      
      showLogin?.addEventListener('click', () => { mode='login'; submitBtn.textContent='Login'; showLogin.classList.add('active'); showSignup.classList.remove('active'); });
      showSignup?.addEventListener('click', () => { mode='signup'; submitBtn.textContent='Sign Up'; showSignup.classList.add('active'); showLogin.classList.remove('active'); });
      
      form?.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const pass = document.getElementById('authPassword').value;
        const users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
        
        if (mode === 'signup') {
          if (users.find(u => u.email === email)) {
            errorP.textContent = 'Email already exists.';
            return;
          }
          users.push({ email, password: pass });
          localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
          currentUser = { email, isAdmin: (email === ADMIN_EMAIL) };
          updateAuthUI();
          toast('Account created! Welcome.');
          renderView('home');
        } else {
          const user = users.find(u => u.email === email && u.password === pass);
          if (user) {
            currentUser = { email: user.email, isAdmin: (user.email === ADMIN_EMAIL) };
            updateAuthUI();
            toast('Login successful.');
            renderView('home');
          } else {
            errorP.textContent = 'Invalid email or password.';
          }
        }
      });
    }

    // ---------- CHAT ----------
    function chatHTML() {
      return `
        <div class="chat-container">
          <h3><i class="fas fa-globe"></i> Public Cyber Chat</h3>
          <div id="chatMessages" class="chat-messages">Loading...</div>
          ${currentUser ? `
          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message...">
            <button class="btn-primary" id="sendChatBtn" style="width:auto;"><i class="fas fa-paper-plane"></i></button>
          </div>` : '<p style="margin-top:1rem;">Please login to chat.</p>'}
        </div>
      `;
    }

    function initChat() {
      const messagesDiv = document.getElementById('chatMessages');
      const input = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendChatBtn');
      
      function renderChatMessages() {
        let html = '';
        chatMessages.slice(-50).forEach(m => {
          const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString() : '';
          html += `<div class="chat-message"><div class="meta">${m.user} • ${time}</div>${m.text}</div>`;
        });
        messagesDiv.innerHTML = html || '<p>No messages yet.</p>';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
      renderChatMessages();
      
      const sendMessage = () => {
        if (!currentUser) return;
        const text = input.value.trim();
        if (!text) return;
        const newMsg = {
          id: Date.now() + Math.random().toString(),
          user: currentUser.email.split('@')[0],
          text: text,
          timestamp: new Date().toISOString()
        };
        chatMessages.push(newMsg);
        if (chatMessages.length > 100) chatMessages.shift();
        saveChat();
        renderChatMessages();
        input.value = '';
      };
      
      sendBtn?.addEventListener('click', sendMessage);
      input?.addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });
    }

    // ---------- ADMIN PANEL ----------
    function adminPanelHTML() {
      return `
        <div class="admin-section">
          <h2><i class="fas fa-shield"></i> Admin Dashboard</h2>
          <div style="margin: 2rem 0;">
            <h3>Add New Service</h3>
            <form id="addServiceForm">
              <div class="flex-row">
                <div class="input-group"><input placeholder="Service Name" id="svcName" required></div>
                <div class="input-group"><input placeholder="Category" id="svcCat" required list="catList"></div>
                <datalist id="catList">
                  <option>💻 Cyber Services</option><option>🏛️ Government Services</option><option>📄 eCitizen Services</option>
                  <option>🎓 Education Services</option><option>🎨 Graphic Design</option><option>🚀 Tech Services</option>
                </datalist>
              </div>
              <div class="input-group"><textarea placeholder="Description" id="svcDesc" rows="2"></textarea></div>
              <div class="input-group"><label>Service Image (optional)</label><input type="file" id="svcImage" accept="image/*"></div>
              <button type="submit" class="btn-primary">Add Service</button>
            </form>
          </div>
          <hr style="border-color:#0cf3; margin:2rem 0;">
          <h3>Manage Services</h3>
          <div id="adminServiceList"></div>
        </div>
      `;
    }

    function renderAdminServiceList() {
      const listDiv = document.getElementById('adminServiceList');
      let html = '';
      services.forEach(s => {
        html += `<div style="background:#1a2533; padding:0.8rem; border-radius:20px; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center;">
          <span><strong>${s.name}</strong> (${s.category})</span>
          <button class="nav-btn delete-service" data-id="${s.id}" style="color:#ff8080;"><i class="fas fa-trash"></i></button>
        </div>`;
      });
      listDiv.innerHTML = html || '<p>No services.</p>';
      
      document.querySelectorAll('.delete-service').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          services = services.filter(s => s.id !== id);
          saveServices();
          renderAdminServiceList();
          toast('Service deleted');
        });
      });
    }

    function attachAdminEvents() {
      const form = document.getElementById('addServiceForm');
      form?.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('svcName').value.trim();
        const cat = document.getElementById('svcCat').value.trim();
        const desc = document.getElementById('svcDesc').value.trim();
        const fileInput = document.getElementById('svcImage');
        
        const reader = new FileReader();
        const file = fileInput.files[0];
        
        const addServiceWithImage = (imageUrl) => {
          const newService = {
            id: Date.now().toString(),
            name, category: cat, description: desc, imageUrl
          };
          services.push(newService);
          saveServices();
          renderAdminServiceList();
          form.reset();
          toast('Service added!');
        };
        
        if (file) {
          reader.onload = (e) => addServiceWithImage(e.target.result);
          reader.readAsDataURL(file);
        } else {
          addServiceWithImage('');
        }
      });
    }

    // ---------- AUTH UI ----------
    function updateAuthUI() {
      if (currentUser) {
        userDisplay.innerHTML = `<i class="fas fa-user"></i> ${currentUser.email}`;
        loginNavBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
        adminNavBtn.style.display = currentUser.isAdmin ? 'inline-block' : 'none';
      } else {
        userDisplay.innerHTML = '<i class="fas fa-user"></i> Guest';
        loginNavBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
        adminNavBtn.style.display = 'none';
      }
    }

    // ---------- LOGOUT ----------
    logoutBtn.addEventListener('click', () => {
      currentUser = null;
      updateAuthUI();
      renderView('home');
      toast('Logged out');
    });

    // ---------- NAVIGATION ----------
    navBtns.forEach(btn => btn.addEventListener('click', (e) => {
      const view = btn.dataset.view;
      if (view === 'admin' && (!currentUser || !currentUser.isAdmin)) {
        toast('Admin login required');
        renderView('login');
        return;
      }
      if (view === 'chat' && !currentUser) {
        toast('Please login to chat');
        renderView('login');
        return;
      }
      renderView(view);
    }));

    // ---------- INITIALIZE ----------
    initData();
    // Check if there is a logged in user from previous session? (not stored, so guest)
    updateAuthUI();
    renderView('home');
  })();
</script>
</body>
  </html>
